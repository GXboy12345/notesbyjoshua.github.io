name: Deploy site

on:
  push:
    branches: [main, frontend]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Resolve Pages base path
        run: |
          if [ "${{ github.repository }}" = "notesbyjoshua/notesbyjoshua.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
            echo "ASTRO_SITE=https://notesbyjoshua.github.io" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/notesbyjoshua.github.io/" >> "$GITHUB_ENV"
            echo "ASTRO_SITE=https://gxboy12345.github.io/notesbyjoshua.github.io" >> "$GITHUB_ENV"
          fi
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
