name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro/package-lock.json
      - run: npm ci
      - name: Write .env from secrets
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          echo "url length: ${#PUBLIC_SUPABASE_URL}"   # 0 means the secret is missing/misnamed
          echo "key length: ${#PUBLIC_SUPABASE_ANON_KEY}"
          printf 'PUBLIC_SUPABASE_URL=%s\n' "$PUBLIC_SUPABASE_URL" >> .env
          printf 'PUBLIC_SUPABASE_ANON_KEY=%s\n' "$PUBLIC_SUPABASE_ANON_KEY" >> .env
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
